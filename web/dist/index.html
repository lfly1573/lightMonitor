<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lightMonitor</title>
    <style>
      :root {
        color: #17243a;
        background: #f4f8fe;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      * { box-sizing: border-box; }
      body { margin: 0; }
      button, input, select, textarea { font: inherit; }
      button {
        border: 0;
        border-radius: 8px;
        background: #0969da;
        color: #fff;
        cursor: pointer;
        min-height: 36px;
        padding: 0 12px;
      }
      button.secondary { background: #e9f3ff; color: #0958bd; }
      button.danger { background: #d92d20; }
      input, select, textarea {
        width: 100%;
        border: 1px solid #c9d9eb;
        border-radius: 8px;
        background: #fff;
        color: #24364a;
        min-height: 36px;
        padding: 7px 10px;
      }
      textarea { min-height: 74px; resize: vertical; }
      table { width: 100%; border-collapse: collapse; }
      th, td { border-bottom: 1px solid #e1ebf7; padding: 9px 8px; text-align: left; vertical-align: top; }
      th { color: #52677f; font-size: 12px; font-weight: 700; }
      .shell { display: grid; min-height: 100vh; grid-template-columns: 236px 1fr; }
      .sidebar { border-right: 1px solid #d9e8f7; background: #fff; padding: 18px 14px; }
      .brand { display: flex; align-items: center; gap: 10px; color: #0969da; font-weight: 800; }
      .brand-mark { display: grid; width: 34px; height: 34px; place-items: center; border-radius: 8px; background: #e9f3ff; }
      .nav { display: grid; gap: 5px; margin-top: 24px; }
      .nav button { background: transparent; color: #52677f; justify-content: flex-start; text-align: left; }
      .nav button.active { background: #eaf4ff; color: #0969da; }
      .content { min-width: 0; padding: 22px; }
      .topbar { display: flex; justify-content: space-between; align-items: center; gap: 16px; margin-bottom: 18px; }
      .topbar h1 { margin: 0; font-size: 24px; }
      .topbar p { margin: 5px 0 0; color: #687b90; }
      .top-actions { display: flex; align-items: center; gap: 8px; }
      .section { display: none; }
      .section.active { display: block; }
      .grid { display: grid; gap: 14px; }
      .grid.two { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .grid.three { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .panel {
        border: 1px solid #d8e6f8;
        border-radius: 8px;
        background: #fff;
        padding: 16px;
      }
      .panel h2, .panel h3 { margin: 0 0 12px; }
      .panel h2 { font-size: 18px; }
      .panel h3 { font-size: 15px; color: #28425f; }
      .metric { display: grid; gap: 6px; }
      .metric span { color: #687b90; font-size: 12px; }
      .metric strong { color: #0969da; font-size: 26px; }
      .form-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; align-items: end; }
      .form-grid label { display: grid; gap: 5px; color: #52677f; font-size: 12px; }
      .form-grid .wide { grid-column: span 2; }
      .form-grid .full { grid-column: 1 / -1; }
      .actions { display: flex; gap: 8px; flex-wrap: wrap; }
      .muted { color: #687b90; }
      .status { min-height: 22px; color: #0958bd; margin: 8px 0; }
      .auth-shell { display: grid; min-height: 100vh; place-items: center; padding: 20px; }
      .auth-panel { width: min(420px, 100%); border: 1px solid #d8e6f8; border-radius: 8px; background: #fff; padding: 24px; }
      .auth-panel h1 { margin: 0 0 10px; color: #0969da; }
      .auth-panel label { display: grid; gap: 6px; margin-top: 12px; color: #52677f; }
      .auth-panel button { width: 100%; margin-top: 16px; }
      .badge { display: inline-flex; border-radius: 999px; background: #eaf4ff; color: #0958bd; padding: 2px 8px; font-size: 12px; }
      .code { font-family: "SFMono-Regular", Consolas, monospace; font-size: 12px; white-space: pre-wrap; }
      @media (max-width: 920px) {
        .shell { grid-template-columns: 1fr; }
        .sidebar { border-right: 0; border-bottom: 1px solid #d9e8f7; }
        .nav { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .grid.two, .grid.three, .form-grid { grid-template-columns: 1fr; }
        .form-grid .wide, .form-grid .full { grid-column: auto; }
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script>
      const i18n = {
        "zh-CN": {
          subtitle: "轻量级数据采集、分析与报警中心",
          install: "初始化系统",
          login: "登录",
          username: "账号",
          password: "密码",
          submit: "提交",
          nav: ["总览", "系统", "用户", "分组", "主动请求", "字段", "报警", "数据"],
        },
        "en-US": {
          subtitle: "Lightweight data collection, analytics, and alerts",
          install: "Initialize",
          login: "Login",
          username: "Username",
          password: "Password",
          submit: "Submit",
          nav: ["Overview", "System", "Users", "Groups", "Active", "Fields", "Alerts", "Data"],
        },
      }

      const state = {
        locale: localStorage.getItem("locale") || "zh-CN",
        installed: false,
        user: null,
        tab: "overview",
        data: {
          dashboard: {},
          settings: [],
          users: [],
          groups: [],
          items: [],
          activeRequests: [],
          fields: [],
          channels: [],
          rules: [],
          samples: [],
          events: [],
          stats: null,
        },
        status: "",
      }

      const tabs = [
        ["overview", 0],
        ["settings", 1],
        ["users", 2],
        ["groups", 3],
        ["active", 4],
        ["fields", 5],
        ["alerts", 6],
        ["data", 7],
      ]

      const app = document.getElementById("app")

      function t() { return i18n[state.locale] }
      function isAdmin() { return state.user && state.user.role === "admin" }
      function esc(value) {
        return String(value ?? "").replace(/[&<>"']/g, (ch) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]))
      }
      async function api(path, options = {}) {
        const res = await fetch(path, {
          credentials: "same-origin",
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options,
        })
        const json = await res.json().catch(() => ({ code: res.status, msg: res.statusText }))
        if (!res.ok || json.code !== 0) throw new Error(json.msg || "request failed")
        return json.data
      }
      function formData(form) {
        const out = {}
        new FormData(form).forEach((value, key) => {
          if (value === "") return
          if (key.endsWith("_seconds") || ["group_id", "item_id", "expected_status_code", "timeout_seconds", "missed_times_threshold", "default_interval_seconds", "consecutive_count", "recovery_count", "aggregate_window_seconds", "aggregate_sample_count"].includes(key)) {
            out[key] = Number(value)
          } else if (["enabled", "alert_enabled", "required", "is_default"].includes(key)) {
            out[key] = value === "true"
          } else {
            out[key] = value
          }
        })
        return out
      }
      function setStatus(msg) {
        state.status = msg
        const el = document.querySelector(".status")
        if (el) el.textContent = msg
      }

      async function init() {
        try {
          const status = await api("/api/install/status")
          state.installed = status.installed
          if (state.installed) {
            try { state.user = await api("/api/auth/me") } catch (_) {}
            if (state.user) await loadAll()
          }
        } catch (err) {
          state.status = err.message
        }
        render()
      }

      async function loadAll() {
        const loaders = [
          ["dashboard", "/api/dashboard"],
          ["settings", "/api/settings"],
          ["users", "/api/users"],
          ["groups", "/api/groups"],
          ["items", "/api/items"],
          ["activeRequests", "/api/active-requests"],
          ["fields", "/api/fields"],
          ["channels", "/api/channels"],
          ["rules", "/api/rules"],
          ["samples", "/api/samples?limit=100"],
          ["events", "/api/events?limit=100"],
        ]
        for (const [key, path] of loaders) {
          try {
            const value = await api(path)
            state.data[key] = value == null && key !== "dashboard" ? [] : value
          } catch (_) {}
        }
      }

      function render() {
        if (!state.installed) return renderAuth("install")
        if (!state.user) return renderAuth("login")
        app.innerHTML = `
          <div class="shell">
            <aside class="sidebar">
              <div class="brand"><span class="brand-mark">LM</span><span>lightMonitor</span></div>
              <nav class="nav">
                ${tabs.map(([id, label]) => `<button class="${state.tab === id ? "active" : ""}" data-tab="${id}">${t().nav[label]}</button>`).join("")}
              </nav>
            </aside>
            <main class="content">
              <header class="topbar">
                <div><h1>lightMonitor</h1><p>${t().subtitle}</p></div>
                <div class="top-actions">
                  <span class="badge">${esc(state.user.username)} / ${esc(state.user.role)}</span>
                  <select id="locale">${Object.keys(i18n).map((l) => `<option ${state.locale === l ? "selected" : ""}>${l}</option>`).join("")}</select>
                  <button class="secondary" id="refresh">刷新</button>
                  <button class="secondary" id="logout">退出</button>
                </div>
              </header>
              <div class="status">${esc(state.status)}</div>
              ${overviewSection()}
              ${settingsSection()}
              ${usersSection()}
              ${groupsSection()}
              ${activeSection()}
              ${fieldsSection()}
              ${alertsSection()}
              ${dataSection()}
            </main>
          </div>`
        bindShell()
      }

      function renderAuth(mode) {
        const labels = t()
        app.innerHTML = `
          <main class="auth-shell">
            <section class="auth-panel">
              <h1>lightMonitor</h1>
              <p class="muted">${mode === "install" ? labels.install : labels.login}</p>
              <form id="authForm">
                <label>${labels.username}<input name="username" autocomplete="username" required /></label>
                <label>${labels.password}<input name="password" type="password" autocomplete="${mode === "install" ? "new-password" : "current-password"}" required minlength="8" /></label>
                <button>${labels.submit}</button>
              </form>
              <div class="status">${esc(state.status)}</div>
              <select id="locale">${Object.keys(i18n).map((l) => `<option ${state.locale === l ? "selected" : ""}>${l}</option>`).join("")}</select>
            </section>
          </main>`
        document.getElementById("locale").onchange = (e) => {
          state.locale = e.target.value
          localStorage.setItem("locale", state.locale)
          render()
        }
        document.getElementById("authForm").onsubmit = async (e) => {
          e.preventDefault()
          try {
            const body = formData(e.target)
            if (mode === "install") {
              await api("/api/install", { method: "POST", body: JSON.stringify(body) })
              state.installed = true
              setStatus("初始化完成，请登录")
            } else {
              state.user = await api("/api/auth/login", { method: "POST", body: JSON.stringify(body) })
              await loadAll()
            }
            render()
          } catch (err) { setStatus(err.message) }
        }
      }

      function overviewSection() {
        const d = state.data.dashboard || {}
        return section("overview", `
          <div class="grid four">
            <div class="grid three">
              ${metric("分组", d.groups || 0)}
              ${metric("监控项", d.items || 0)}
              ${metric("24小时样本", d.samples_24h || 0)}
            </div>
          </div>
          <div class="panel" style="margin-top:14px">
            <h2>近期报警</h2>
            ${eventsTable(d.recent_events || [])}
          </div>`)
      }

      function settingsSection() {
        return section("settings", `
          <div class="panel">
            <h2>系统参数</h2>
            <form id="settingsForm" class="grid">
              ${state.data.settings.map((s, i) => `
                <label>${esc(s.key)}
                  <input name="${esc(s.key)}" value="${esc(s.value)}" ${isAdmin() ? "" : "disabled"} />
                  <small class="muted">${esc(s.description)}</small>
                </label>`).join("")}
              ${isAdmin() ? `<button>保存参数</button>` : ""}
            </form>
          </div>`)
      }

      function usersSection() {
        return section("users", `
          ${isAdmin() ? formPanel("userForm", "新增用户", [
            ["username", "账号"], ["password", "密码"], ["display_name", "显示名"], ["role", "角色", "select", [["admin","管理员"],["viewer","查看者"]]], ["enabled", "启用", "select", [["true","是"],["false","否"]]]
          ]) : ""}
          <div class="panel"><h2>用户</h2>${table(["账号","角色","启用","登录时间","操作"], state.data.users.map(u => [u.username, u.role, u.enabled ? "是" : "否", u.last_login_at || "", isAdmin() ? delButton("user", u.id) : ""]))}</div>`)
      }

      function groupsSection() {
        return section("groups", `
          ${isAdmin() ? formPanel("groupForm", "新增分组", [
            ["code","分组标记"],["name","分组名称"],["description","描述"],["default_interval_seconds","默认间隔秒"],["missed_times_threshold","缺失次数"],["alert_enabled","报警", "select", [["true","开"],["false","关"]]],["enabled","启用", "select", [["true","是"],["false","否"]]]
          ]) : ""}
          <div class="panel"><h2>分组</h2>${table(["标记","名称","间隔","缺失次数","启用","操作"], state.data.groups.map(g => [g.code, g.name, g.default_interval_seconds, g.missed_times_threshold, g.enabled ? "是" : "否", isAdmin() ? delButton("group", g.id) : ""]))}</div>
          ${isAdmin() ? formPanel("itemForm", "新增监控项", [
            ["group_id","分组","group"],["source_type","类型","select",[["passive","被动"],["active","主动"]]],["name","名称"],["description","描述"],["interval_seconds","间隔秒"],["missed_times_threshold","缺失次数"],["alert_enabled","报警", "select", [["true","开"],["false","关"]]],["enabled","启用", "select", [["true","是"],["false","否"]]]
          ]) : ""}
          <div class="panel"><h2>监控项</h2>${table(["分组","类型","名称","间隔","最后数据","操作"], state.data.items.map(i => [groupName(i.group_id), i.source_type, i.name, i.interval_seconds, i.last_seen_at || "", isAdmin() ? delButton("item", i.id) : ""]))}</div>`)
      }

      function activeSection() {
        return section("active", `
          ${isAdmin() ? formPanel("activeForm", "新增主动请求", [
            ["group_id","分组","group"],["name","名称"],["url","URL","text","wide"],["method","方法","select",[["GET","GET"],["POST","POST"]]],["body_type","请求体","select",[["none","无"],["json","JSON"],["form-data","Form"]]],["interval_seconds","间隔秒"],["timeout_seconds","超时秒"],["expected_status_code","期望状态码"],["headers_json","Header JSON","textarea","wide"],["body_json","Body JSON","textarea","wide"],["enabled","启用", "select", [["true","是"],["false","否"]]]
          ]) : ""}
          <div class="panel"><h2>主动请求</h2>${table(["分组","名称","方法","URL","间隔","启用","操作"], state.data.activeRequests.map(r => [groupName(r.group_id), r.name, r.method, `<span class="code">${esc(r.url)}</span>`, r.interval_seconds, r.enabled ? "是" : "否", isAdmin() ? delButton("active", r.id) : ""]))}</div>`)
      }

      function fieldsSection() {
        return section("fields", `
          ${isAdmin() ? formPanel("fieldForm", "字段定义", [
            ["scope_type","范围","select",[["group","分组"],["item","监控项"]]],["group_id","分组","group"],["item_id","监控项","item"],["field_path","字段路径"],["display_name","显示名"],["value_type","类型","select",[["string","字符串"],["integer","整数"],["float","浮点"],["boolean","布尔"]]],["unit","单位"],["required","必填","select",[["false","否"],["true","是"]]],["enabled","启用", "select", [["true","是"],["false","否"]]]
          ]) : ""}
          <div class="panel"><h2>字段</h2>${table(["范围","分组","监控项","路径","类型","单位","操作"], state.data.fields.map(f => [f.scope_type, groupName(f.group_id), f.item_id ? itemName(f.item_id) : "", f.field_path, f.value_type, f.unit || "", isAdmin() ? delButton("field", f.id) : ""]))}</div>`)
      }

      function alertsSection() {
        return section("alerts", `
          ${isAdmin() ? formPanel("channelForm", "通知渠道", [
            ["code","标记"],["name","名称"],["channel_type","类型"],["config_json","配置 JSON","textarea","wide"],["enabled","启用","select",[["true","是"],["false","否"]]],["is_default","默认","select",[["false","否"],["true","是"]]]
          ]) : ""}
          <div class="panel"><h2>通知渠道</h2>${table(["标记","名称","类型","启用","操作"], state.data.channels.map(c => [c.code, c.name, c.channel_type, c.enabled ? "是" : "否", isAdmin() ? delButton("channel", c.id) : ""]))}</div>
          ${isAdmin() ? formPanel("ruleForm", "报警规则", [
            ["name","名称"],["scope_type","范围","select",[["global","全局"],["group","分组"],["item","监控项"],["field","字段"]]],["group_id","分组","group"],["item_id","监控项","item"],["source_type","来源","select",[["any","任意"],["passive","被动"],["active","主动"]]],["rule_type","规则","select",[["missing_data","缺失数据"],["request_failed","请求失败"],["field_condition","字段条件"],["aggregate_condition","聚合条件"]]],["field_path","字段路径"],["operator","操作符","select",[["gt",">"],["gte",">="],["lt","<"],["lte","<="],["eq","="],["ne","!="],["contains","包含"],["not_contains","不包含"],["exists","存在"],["not_exists","不存在"]]],["threshold_value","阈值"],["aggregate_func","聚合","select",[["avg","平均"],["max","最大"],["min","最小"],["median","中位"],["count","数量"]]],["aggregate_window_seconds","窗口秒"],["consecutive_count","连续次数"],["recovery_count","恢复次数"],["severity","级别","select",[["warning","警告"],["critical","严重"],["info","信息"]]],["message_template","通知模板","textarea","wide"]
          ]) : ""}
          <div class="panel"><h2>报警规则</h2>${table(["名称","范围","类型","字段","条件","级别","启用","操作"], state.data.rules.map(r => [r.name, r.scope_type, r.rule_type, r.field_path || "", `${r.operator || ""} ${r.threshold_value || ""}`, r.severity, r.enabled ? "是" : "否", isAdmin() ? delButton("rule", r.id) : ""]))}</div>`)
      }

      function dataSection() {
        return section("data", `
          <div class="panel">
            <h2>样本查询</h2>
            <form id="sampleFilter" class="form-grid">
              ${selectGroup("group_id")} ${selectItem("item_id")} <label>数量<input name="limit" value="100" /></label><button>查询</button>
            </form>
            ${samplesTable(state.data.samples)}
          </div>
          <div class="panel">
            <h2>字段统计</h2>
            <form id="statsFilter" class="form-grid">
              ${selectGroup("group_id")} ${selectItem("item_id")} <label>字段路径<input name="field_path" /></label><label>小时<input name="hours" value="24" /></label><button>统计</button>
            </form>
            ${state.data.stats ? `<pre class="code">${esc(JSON.stringify(state.data.stats, null, 2))}</pre>` : ""}
          </div>
          <div class="panel"><h2>报警事件</h2>${eventsTable(state.data.events)}</div>`)
      }

      function section(id, html) { return `<section class="section ${state.tab === id ? "active" : ""}" id="${id}">${html}</section>` }
      function metric(label, value) { return `<div class="panel metric"><span>${label}</span><strong>${esc(value)}</strong></div>` }
      function table(headers, rows) {
        return `<table><thead><tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr></thead><tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`
      }
      function samplesTable(samples) {
        return table(["时间","分组","名称","来源","状态","字段"], samples.map(s => [s.received_at, groupName(s.group_id), s.name, s.source_type, s.status, `<span class="code">${esc((s.values || []).map(v => `${v.field_path}=${v.raw_value ?? v.string_value ?? ""}`).join("\\n"))}</span>`]))
      }
      function eventsTable(events) {
        return table(["时间","级别","类型","标题","消息"], events.map(e => [e.occurred_at, e.severity, e.event_type, e.title, e.message]))
      }
      function formPanel(id, title, fields) {
        return `<div class="panel"><h2>${title}</h2><form id="${id}" class="form-grid">${fields.map(fieldControl).join("")}<button>保存</button></form></div>`
      }
      function fieldControl(f) {
        const [name, label, type, opts] = f
        if (type === "group") return selectGroup(name)
        if (type === "item") return selectItem(name)
        if (type === "select") return `<label>${label}<select name="${name}">${opts.map(([v, l]) => `<option value="${v}">${l}</option>`).join("")}</select></label>`
        if (type === "textarea") return `<label class="${opts === "wide" ? "wide" : ""}">${label}<textarea name="${name}">${name.includes("json") ? "{}" : ""}</textarea></label>`
        const cls = opts === "wide" ? "wide" : ""
        return `<label class="${cls}">${label}<input name="${name}" /></label>`
      }
      function selectGroup(name) {
        return `<label>分组<select name="${name}"><option value="">请选择</option>${state.data.groups.map(g => `<option value="${g.id}">${esc(g.code)} / ${esc(g.name)}</option>`).join("")}</select></label>`
      }
      function selectItem(name) {
        return `<label>监控项<select name="${name}"><option value="">可选</option>${state.data.items.map(i => `<option value="${i.id}">${esc(i.name)}</option>`).join("")}</select></label>`
      }
      function groupName(id) {
        const g = state.data.groups.find(x => x.id === id)
        return g ? `${g.code} / ${g.name}` : id
      }
      function itemName(id) {
        const i = state.data.items.find(x => x.id === id)
        return i ? i.name : id
      }
      function delButton(type, id) { return `<button class="danger" data-del="${type}" data-id="${id}">删除</button>` }

      function bindShell() {
        document.querySelectorAll("[data-tab]").forEach(btn => btn.onclick = () => { state.tab = btn.dataset.tab; render() })
        document.getElementById("locale").onchange = (e) => { state.locale = e.target.value; localStorage.setItem("locale", state.locale); render() }
        document.getElementById("refresh").onclick = async () => { await loadAll(); render() }
        document.getElementById("logout").onclick = async () => { await api("/api/auth/logout", { method: "POST" }); state.user = null; render() }
        bindForms()
        document.querySelectorAll("[data-del]").forEach(btn => btn.onclick = () => deleteEntity(btn.dataset.del, btn.dataset.id))
      }

      function bindForms() {
        bindForm("settingsForm", async (form) => {
          const fd = new FormData(form)
          const payload = state.data.settings.map(s => ({ ...s, value: fd.get(s.key) || "" }))
          state.data.settings = await api("/api/settings", { method: "PUT", body: JSON.stringify(payload) })
        })
        bindForm("userForm", async (form) => api("/api/users", { method: "POST", body: JSON.stringify(formData(form)) }))
        bindForm("groupForm", async (form) => api("/api/groups", { method: "POST", body: JSON.stringify(formData(form)) }))
        bindForm("itemForm", async (form) => api("/api/items", { method: "POST", body: JSON.stringify(formData(form)) }))
        bindForm("activeForm", async (form) => api("/api/active-requests", { method: "POST", body: JSON.stringify(formData(form)) }))
        bindForm("fieldForm", async (form) => api("/api/fields", { method: "POST", body: JSON.stringify(formData(form)) }))
        bindForm("channelForm", async (form) => api("/api/channels", { method: "POST", body: JSON.stringify(formData(form)) }))
        bindForm("ruleForm", async (form) => api("/api/rules", { method: "POST", body: JSON.stringify(formData(form)) }))
        bindForm("sampleFilter", async (form) => {
          const q = new URLSearchParams(formData(form)).toString()
          state.data.samples = await api(`/api/samples?${q}`)
        })
        bindForm("statsFilter", async (form) => {
          const q = new URLSearchParams(formData(form)).toString()
          state.data.stats = await api(`/api/stats?${q}`)
        })
      }
      function bindForm(id, fn) {
        const form = document.getElementById(id)
        if (!form) return
        form.onsubmit = async (e) => {
          e.preventDefault()
          try {
            await fn(form)
            setStatus("已保存")
            await loadAll()
            render()
          } catch (err) { setStatus(err.message) }
        }
      }
      async function deleteEntity(type, id) {
        const endpoints = { user: "users", group: "groups", item: "items", active: "active-requests", field: "fields", channel: "channels", rule: "rules" }
        if (!confirm("确认删除？")) return
        try {
          await api(`/api/${endpoints[type]}/${id}`, { method: "DELETE" })
          await loadAll()
          render()
        } catch (err) { setStatus(err.message) }
      }

      init()
    </script>
  </body>
</html>
